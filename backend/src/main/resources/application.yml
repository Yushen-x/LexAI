spring:
  application:
    name: lexai-backend
  # 成员B：嵌入式 H2（演示用，后续可换 MySQL）；见 TASK.md §2.1
  datasource:
    url: jdbc:h2:file:./data/lexai-db;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    # 等实体与 data.sql 就绪后，先由 Hibernate 建表再执行 data.sql（Commit 4）
    defer-datasource-initialization: true
  sql:
    init:
      mode: always

server:
  port: 8081
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cors:
    allowed-origins: http://localhost:5173

# AI 网关配置：默认使用 mock，避免影响当前联调。
# 切到腾讯/得理实现请设置：lexai.ai.mode=tencent
lexai:
  ai:
    mode: tencent
  deli:
    # 得理开放平台（示例：使用环境变量注入，避免提交真实密钥）
    app-id: ${DELI_APP_ID:}
    secret: ${DELI_SECRET:}
    timeout-ms: 10000
  tencent:
    llm:
      # 腾讯大模型的调用地址与鉴权方式在不同账号/SDK 下可能不同：
      # 这里只做“可配置 + 失败兜底”，未配置时将跳过 LLM 调用并退回到模板输出。
      endpoint: ${TENCENT_LLM_ENDPOINT:}
      api-key: ${TENCENT_LLM_API_KEY:}
      model: ${TENCENT_LLM_MODEL:}
      timeout-ms: 20000
  knowledge:
    # 本地知识库目录（目录下放若干 .txt 文件）
    # 未配置或目录不存在时将返回空检索结果。
    path: ${LEXAI_KNOWLEDGE_PATH:}
    # 向量索引文件（默认落在知识库目录下 .vector-index.json）
    index-path: ${LEXAI_KNOWLEDGE_INDEX_PATH:}
    # 文档切分参数（字符级）
    chunk-size: 320
    chunk-overlap: 60
