spring:
  application:
    name: lexai-backend
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:lexai}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USERNAME:lexai}
    password: ${MYSQL_PASSWORD:lexai_demo_2026}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Shanghai
    defer-datasource-initialization: true
  sql:
    init:
      mode: always

server:
  port: 8081
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

lexai:
  ai:
    mode: ${LEXAI_AI_MODE:tencent}
    review:
      self-check: ${LEXAI_AI_REVIEW_SELF_CHECK:true}
  deli:
    app-id: ${DELI_APP_ID:}
    secret: ${DELI_SECRET:}
    timeout-ms: 10000
  tencent:
    llm:
      endpoint: ${TENCENT_LLM_ENDPOINT:https://api.hunyuan.cloud.tencent.com/v1/chat/completions}
      api-key: ${TENCENT_LLM_API_KEY:}
      model: ${TENCENT_LLM_MODEL:hunyuan-lite}
      timeout-ms: 20000
  knowledge:
    path: ${LEXAI_KNOWLEDGE_PATH:}
    index-path: ${LEXAI_KNOWLEDGE_INDEX_PATH:}
    chunk-size: 320
    chunk-overlap: 60
